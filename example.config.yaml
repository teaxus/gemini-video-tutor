# =====================================================================
# Gemini Video Tutor — 配置模板
#
# 使用方法：
#   cp example.config.yaml config.yaml   # 然后编辑 config.yaml 填入实际值
#
# 注意：
#   - config.yaml 已被 .gitignore 忽略，真实密钥只写在 config.yaml 里
#   - 配置优先级：命令行参数 > 环境变量 > config.yaml > 内置默认值
#   - 可用环境变量 GEMINI_TUTOR_CONFIG 指定其他配置文件路径
#   - 仅支持本文件展示的 YAML 子集（两级嵌套 + 标量），不要使用锚点/列表等高级语法
# =====================================================================

gemini:
  # 【必填】Gemini API Key（等效环境变量：GEMINI_API_KEY）
  api_key: ""

  # API 入口地址（等效环境变量：GEMINI_BASE_URL）
  # 官方：https://generativelanguage.googleapis.com
  # 使用代理/中转时填代理地址，注意不带 /v1beta/ 后缀
  base_url: "https://generativelanguage.googleapis.com"

  # 分析使用的模型（等效环境变量：GEMINI_MODEL）
  # 常用：gemini-2.5-flash / gemini-2.5-pro / gemini-3-flash-preview / gemini-3-pro-preview
  model: "gemini-2.5-flash"

  # 认证方式（等效环境变量：GEMINI_AUTH）。决定能否用官方 Gemini 端点。
  #   auto    —— 自动判断：官方 googleapis.com 用 x-goog-api-key，其它代理用 Bearer（推荐）
  #   api-key —— 强制 x-goog-api-key 头（Google 官方 REST 风格）
  #   bearer  —— 强制 Authorization: Bearer（大多数中转/代理）
  auth: "auto"

  # 接口协议（等效环境变量：GEMINI_API_STYLE）
  #   auto   —— 自动判断（推荐）：官方 googleapis.com 走 gemini 原生协议，
  #             其它一律按 OpenAI 兼容中转处理（OpenRouter/one-api/new-api 的事实标准）
  #   openai —— 强制 OpenAI 兼容 chat/completions（视频以 base64 video_url 内联发送，
  #             模型名按中转要求填，如 google/gemini-2.5-flash；
  #             路径自适应：openrouter.ai 用 /api/v1/，其它用 /v1/，base_url 已含前缀则不重复加）
  #   gemini —— 强制 Gemini 原生 REST（/v1beta/...:generateContent + File API）。
  #             仅当你的中转是 Gemini 原生协议透传（如部分多协议站的 gemini 通道）时设置
  api_style: "auto"

  # 请求失败（429 限流 / 503 过载 / 网络错误）时的最大尝试次数
  max_retries: 3

  # 重试基础等待秒数（实际等待 = 该值 × 当前重试次数，线性退避）
  retry_delay_seconds: 15

  # 单次 API 请求超时秒数（长视频上传+分析较慢，不建议低于 300）
  request_timeout_seconds: 600

  # 单次回复最大输出 token 数
  max_output_tokens: 65536

  # 生成温度（0-2）。越低越严谨稳定，分析类任务建议 0.2-0.6
  temperature: 0.4

analysis:
  # 默认分析方法（提示词档案），对应 prompts/<名称>.md
  # 内置档案：tutorial（教程整理，原项目默认行为）/ summary（内容摘要）
  # 新建 prompts/我的方法.md 即可扩展自己的分析方法
  # 提示词文件每次运行时实时读取——修改后立即生效，无需重启 skill 或 agent
  profile: "tutorial"

  # 提示词档案目录。留空 = 本 skill 目录下的 prompts/
  prompts_dir: ""

  # 强制证据要求：自动向提示词追加"所有结论必须标注时间戳 [MM:SS]、
  # 关键画面标注 [screenshot_MM_SS.jpg]（自动提取截图）"的硬性规则。
  # 自定义档案里已写明截图规则时不会重复追加。
  require_evidence: true

  # 长视频自动分段阈值（分钟）。超过则切段、顺序携带前文上下文处理
  # 参考：1M context 模型约能容纳 55 分钟视频，40 留有提示词+输出余量
  chunk_minutes: 40

  # 固定间隔截图秒数（备用参数；当前默认按 Gemini 标注的关键帧按需提取）
  keyframe_interval: 5

  # 单个长视频的分段是否并行分析（等效命令行 --parallel-chunks）
  # false（默认）：顺序处理，每段携带前文上下文，编号连贯、质量最好
  # true：各段并发处理（速度≈快 N 倍），但段与段之间互相看不见，
  #       编号改用时间小节、可能出现少量重复表述。追求速度时再开。
  parallel_chunks: false

video:
  # Gemini 不支持的容器格式（如 .mkv / .ts）自动转换为 mp4 后再上传
  auto_convert: true

  # 在线视频（经 video-downloader）下载到哪（等效环境变量：GEMINI_TUTOR_DOWNLOAD_DIR）
  # 留空（推荐）= 下载进本次分析的产物目录，视频/文档/截图同目录，方便整体归档，
  # 也保证 --resume 和 ask.py 会话引用的视频路径长期有效
  # 填固定目录（如 ~/Videos/library）= 所有下载集中存放
  download_dir: ""

  # File API 不可用、降级为 inline base64 上传时的体积上限（MB）。
  # 超过该值自动压缩（720p H.264）。base64 膨胀约 33%，代理常见限制 10MB → 默认 6
  inline_max_mb: 6

batch:
  # 批量模式（--batch）与分段并行（parallel_chunks）的默认并发数
  workers: 2

chat:
  # 多轮追问会话（scripts/ask.py）保留的最近对话轮数（一问一答算 1 轮）。
  # 超出后丢弃最早的轮次（视频引用始终保留）。轮数越大上下文越完整、token 越贵
  max_history: 20

  # 会话存储目录。留空 = 本 skill 目录下的 sessions/（已被 .gitignore 忽略）
  # 等效环境变量：GEMINI_TUTOR_SESSION_DIR
  session_dir: ""
